<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Face Authentication</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 2rem rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        .login-bg {
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
            color: white;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card login-card mx-auto">
            <div class="row g-0 h-100">
                <div class="col-lg-6 d-none d-lg-flex login-bg">
                    <h2 class="fw-bold mb-4">Face Authentication</h2>
                    <p class="lead mb-0">Secure, automated, and intelligent attendance management system using Face
                        Recognition technology.</p>
                </div>
                <div class="col-lg-6">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h4 class="text-gray-900 mb-2 fw-bold">Welcome Back!</h4>
                            <p class="text-muted">Please login to your account.</p>
                        </div>

                        <form method="POST" action="{% url 'accounts:login' %}" class="user">
                            {% csrf_token %}
                            {% if form.errors %}
                            <div class="alert alert-danger" role="alert">
                                Invalid username or password.
                            </div>
                            {% endif %}

                            <div class="mb-3">
                                <label for="username" class="form-label ms-1 text-muted small fw-bold">Username</label>
                                <input type="text" name="username"
                                    class="form-control form-control-user form-control-lg rounded-pill fs-6"
                                    id="username" placeholder="Enter Username..." required autofocus>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label ms-1 text-muted small fw-bold">Password</label>
                                <input type="password" name="password"
                                    class="form-control form-control-user form-control-lg rounded-pill fs-6"
                                    id="password" placeholder="Password" required>
                            </div>

                            <button type="submit"
                                class="btn btn-primary btn-user btn-block w-100 rounded-pill py-2 fw-bold shadow-sm"
                                style="background-color: #4e73df; border-color: #4e73df;">
                                Login
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
